<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Management Tool</title>
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
  <script src="https://cdn.tailwindcss.com" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            azure: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
          }
        }
      }
    }
  </script>
  <style>
    /* Critical CSS inlined — prevents flash of unstyled content while Tailwind loads */
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: #f9fafb; margin: 0; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-azure-600 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold text-gray-900">Change Management</h1>
          <p class="text-sm text-gray-500">Azure Static Web Apps</p>
        </div>
      </div>
      <button onclick="openModal()" class="inline-flex items-center gap-2 bg-azure-600 hover:bg-azure-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        New Change Request
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <p class="text-sm font-medium text-gray-500">Total Requests</p>
        <p id="stat-total" class="text-2xl font-bold text-gray-900 mt-1">0</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <p class="text-sm font-medium text-gray-500">Pending</p>
        <p id="stat-pending" class="text-2xl font-bold text-yellow-600 mt-1">0</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <p class="text-sm font-medium text-gray-500">Approved</p>
        <p id="stat-approved" class="text-2xl font-bold text-green-600 mt-1">0</p>
      </div>
    </div>

    <!-- Dashboard Table -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-gray-900">Change Requests</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              <th class="px-6 py-3">ID</th>
              <th class="px-6 py-3">Title</th>
              <th class="px-6 py-3">Priority</th>
              <th class="px-6 py-3">Status</th>
              <th class="px-6 py-3">Created</th>
              <th class="px-6 py-3">Action</th>
            </tr>
          </thead>
          <tbody id="changes-table" class="divide-y divide-gray-100">
            <tr>
              <td colspan="6" class="px-6 py-12 text-center text-gray-400">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50">
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md relative" onclick="event.stopPropagation()">
        <div class="px-6 py-5 border-b border-gray-200">
          <h3 class="text-lg font-semibold text-gray-900">New Change Request</h3>
          <p class="text-sm text-gray-500 mt-1">Submit a new change for review</p>
        </div>
        <form id="change-form" class="px-6 py-5 space-y-4" onsubmit="submitChange(event)">
          <div>
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text" id="title" name="title" required maxlength="200" placeholder="e.g. Update firewall rules for subnet B"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-azure-500 focus:border-azure-500 outline-none transition" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="impact" class="block text-sm font-medium text-gray-700 mb-1">Impact</label>
              <select id="impact" name="impact" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-azure-500 focus:border-azure-500 outline-none bg-white transition">
                <option value="">Select...</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <div>
              <label for="urgency" class="block text-sm font-medium text-gray-700 mb-1">Urgency</label>
              <select id="urgency" name="urgency" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-azure-500 focus:border-azure-500 outline-none bg-white transition">
                <option value="">Select...</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
          </div>
          <div id="form-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
          <div class="flex justify-end gap-3 pt-2">
            <button type="button" onclick="closeModal()" class="px-4 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition">Cancel</button>
            <button type="submit" id="submit-btn" class="px-4 py-2.5 text-sm font-medium text-white bg-azure-600 rounded-lg hover:bg-azure-700 transition shadow-sm">Submit Request</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
